<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOYFIT24経堂｜ゴールデンウィーク特別プログラム（2026年5月）</title>
  <meta name="description" content="JOYFIT24経堂のゴールデンウィーク特別レッスンプログラム（2026年5月）。5/4（月）〜5/6（水）のスケジュールとお申込み。">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            jf: { red: '#C21642', reddark: '#9d1135' }
          }
        }
      }
    };

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --jf-red: #C21642;
      --jf-red-dark: #9d1135;
      --jf-soft: rgba(194, 22, 66, 0.1);
    }
    body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
    .input {
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid #d4d4d4;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input:focus {
      outline: none;
      border-color: var(--jf-red);
      box-shadow: 0 0 0 3px var(--jf-soft);
    }
    .required::after { content: ' *'; color: var(--jf-red); font-weight: 700; }
  </style>
</head>
<body class="text-neutral-900 bg-white antialiased">
  <script>
    const EVENT_CONFIG = {
      storeName: 'JOYFIT24経堂',
      campaignTitle: 'ゴールデンウィーク 特別プログラム',
      subCatch: '2026年5月／ホットスタジオ・ピラティスルームの特別枠のご案内です。',
      periodLine: '2026年5月4日（月）〜5月6日（水）',
      venueLine: 'JOYFIT24経堂',
      noteBullets: [
        '5/4〜5/6は非会員の方もご参加いただけます（家族・友人のお誘い可）。',
        '参加は事前予約が必要です。詳細は館内掲示・参加券等でご確認ください。',
        '通常プログラムで「休講」「イベント」のレッスンは本表に掲載されません。休日プログラムは振替表をご参照ください。',
        '3階のご利用時間は20:00までです。'
      ],
      access: {
        line1: 'JOYFIT24経堂',
        line2: '住所・アクセスは店舗公式の案内に準じます。'
      }
    };

    window.GW_SCHEDULE = [
      {
        dateIso: '2026-05-04',
        label: '5月4日（月）',
        blocks: [
          {
            room: 'ホットスタジオ',
            lessons: [
              { time: '9:30–10:30', title: 'ストレッチヨガ', difficulty: '★', instructor: 'YOKO', caption: '' },
              { time: '10:45–11:45', title: 'ベーシックヨガ', difficulty: '★★', instructor: 'YOKO', caption: '' },
              { time: '13:45–14:45', title: '睡眠のためのポールストレッチ', difficulty: '★', instructor: 'MIE', caption: '' },
              { time: '15:15–16:15', title: 'かんたんサーキット', difficulty: '★★★', instructor: 'MIE', caption: '' },
              { time: '17:00–17:45', title: 'リラックスヨガ', difficulty: '★', instructor: '坂東', caption: '' },
              { time: '18:00–19:00', title: 'カラダ調整ヨガ', difficulty: '★★', instructor: '坂東', caption: '' }
            ]
          },
          {
            room: 'ピラティスルーム',
            lessons: [
              { time: '10:30–11:30', title: 'ピラティスリフォーマー アーム＆ショルダー・スタビリティ', difficulty: '★★★', instructor: 'YUKI', caption: '' },
              { time: '12:00–13:00', title: 'ピラティスリフォーマー テニス＆オープン', difficulty: '★★', instructor: 'YUKI', caption: '' }
            ]
          }
        ],
        foot: '3階のご利用時間は20:00までです。'
      },
      {
        dateIso: '2026-05-05',
        label: '5月5日（火）',
        blocks: [
          {
            room: 'ホットスタジオ',
            lessons: [
              { time: '9:30–10:30', title: 'ハタヨガ ビギナー', difficulty: '★', instructor: 'ナカシマトオル', caption: '' },
              { time: '10:45–11:45', title: 'パワーヨガ', difficulty: '★★★', instructor: 'ナカシマトオル', caption: '' },
              { time: '12:15–13:15', title: 'ホイールで月礼拝', difficulty: '★★', instructor: 'MIE', caption: '' },
              { time: '13:45–14:45', title: 'SHIN美', difficulty: '★★', instructor: 'MIE', caption: '' },
              { time: '15:15–16:45', title: '★ポール＆全身ストレッチヨガ', difficulty: '★', instructor: 'シカノ', caption: '初めての方もOK。男性やカラダの硬い方も安心してご参加いただけます。' },
              { time: '18:00–19:15', title: '★ポール＆全身ストレッチヨガ', difficulty: '★', instructor: 'シカノ', caption: '' }
            ]
          },
          {
            room: 'ピラティスルーム',
            lessons: [
              { time: '16:45–17:45', title: 'ピラティスリフォーマー アーム＆ショルダー・スタビリティ', difficulty: '★★★', instructor: 'みと', caption: '' },
              { time: '18:15–19:15', title: 'ピラティスリフォーマー 美尻メイク', difficulty: '★★★', instructor: 'みと', caption: '' }
            ]
          }
        ],
        foot: '3階のご利用時間は20:00までです。'
      },
      {
        dateIso: '2026-05-06',
        label: '5月6日（水）',
        blocks: [
          {
            room: 'ホットスタジオ',
            lessons: [
              { time: '9:30–10:30', title: '★首肩コリ腰痛改善ヨガ', difficulty: '★', instructor: 'マリコ', caption: 'ストレートネック・猫背改善を意識。腰に無理のないストレッチ。' },
              { time: '10:45–11:45', title: '快眠ヨガリラックス', difficulty: '★', instructor: 'マリコ', caption: '骨盤・横隔膜を呼吸で動かし、セルフマッサージでストレスを解放。' },
              { time: '13:30–14:30', title: 'リズムステップ', difficulty: '★★', instructor: 'ハチ', caption: '' },
              { time: '15:00–15:45', title: 'はじめてのHIPHOP', difficulty: '★★', instructor: 'ハチ', caption: '' },
              { time: '17:00–17:45', title: 'ホイールで月礼拝', difficulty: '★★', instructor: 'ハナ', caption: '' },
              { time: '18:15–19:15', title: '鍛えるヨガ', difficulty: '★★', instructor: 'ハナ', caption: '' }
            ]
          },
          {
            room: 'ピラティスルーム',
            lessons: [
              { time: '12:15–13:15', title: 'ピラティスリフォーマー 美尻メイク', difficulty: '★★★', instructor: 'YUKI', caption: '' },
              { time: '13:45–14:45', title: 'ピラティスリフォーマー トータルボディメイク', difficulty: '★★★', instructor: 'YUKI', caption: '' }
            ]
          }
        ],
        foot: '3階のご利用時間は20:00までです。'
      }
    ];
  </script>

  <header class="border-b border-neutral-200 bg-white">
    <div class="mx-auto max-w-4xl px-4 py-4 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="flex h-12 w-12 shrink-0 flex-col items-center justify-center bg-[#C21642] text-center leading-none text-white font-bold">
          <span class="text-[0.55rem] tracking-tight">JOYFIT</span>
          <span class="text-lg">24</span>
        </div>
        <div>
          <p class="text-xs text-neutral-500 leading-snug">かしこく使える24時間ジム</p>
          <p class="text-sm font-semibold text-neutral-900" id="header-store">JOYFIT24経堂</p>
        </div>
      </div>
      <div class="flex gap-2">
        <a href="#schedule" class="rounded-full border border-neutral-300 bg-white px-4 py-2 text-sm font-medium text-neutral-800 hover:bg-neutral-50">スケジュール</a>
        <a href="#apply" class="rounded-full bg-[#C21642] px-5 py-2 text-sm font-bold text-white hover:bg-[#9d1135]">お申込み</a>
      </div>
    </div>
  </header>

  <section class="border-b border-neutral-200 bg-neutral-50">
    <div class="mx-auto max-w-4xl px-4 py-10 sm:py-12">
      <p class="text-sm font-semibold text-[#C21642]">2026年5月 特別プログラム</p>
      <h1 class="mt-2 text-2xl sm:text-3xl font-bold text-neutral-900 leading-tight" id="hero-title"></h1>
      <p class="mt-3 text-neutral-600 text-sm sm:text-base leading-relaxed" id="hero-sub"></p>
      <div class="mt-4 flex flex-wrap gap-2 text-sm">
        <span class="rounded border border-neutral-200 bg-white px-3 py-1 text-neutral-700" id="hero-period"></span>
        <span class="rounded border border-neutral-200 bg-white px-3 py-1 text-neutral-700" id="hero-venue"></span>
      </div>
      <ul class="mt-6 space-y-2 text-sm text-neutral-700 border-t border-neutral-200 pt-6" id="hero-points"></ul>
    </div>
  </section>

  <main>
    <section id="schedule" class="mx-auto max-w-4xl px-4 py-12 sm:py-14">
      <div class="flex flex-wrap items-end justify-between gap-4 border-b border-neutral-900 pb-3">
        <h2 class="text-xl sm:text-2xl font-bold text-neutral-900">レッスンスケジュール</h2>
        <span class="text-sm font-semibold text-[#C21642]">GW</span>
      </div>
      <p class="mt-3 text-sm text-neutral-600">星（★）は難易度です。先頭に★のついたプログラム名は特別レッスン表記です。</p>
      <div id="schedule-days" class="mt-8 space-y-10"></div>
      <div class="mt-8 flex overflow-hidden rounded-lg border border-neutral-200 bg-white shadow-sm" id="notice-box"></div>
    </section>

    <section class="border-y border-neutral-200 bg-neutral-50">
      <div class="mx-auto max-w-4xl px-4 py-10 grid gap-6 sm:grid-cols-2">
        <div class="rounded-lg border border-neutral-200 bg-white p-5">
          <h2 class="text-base font-bold text-neutral-900 border-l-4 border-[#C21642] pl-3">ご来店の流れ（当日）</h2>
          <ol class="mt-4 space-y-3 text-sm text-neutral-700 list-decimal pl-5 marker:font-semibold marker:text-[#C21642]">
            <li><span class="font-semibold text-neutral-900">インターホン</span>を鳴らしてお呼び出しください。</li>
            <li>レッスン開始の<span class="font-semibold text-neutral-900">30分前</span>までにご来店ください。</li>
            <li><span class="font-semibold text-neutral-900">スタッフがご案内</span>いたします。</li>
          </ol>
        </div>
        <div class="rounded-lg border border-neutral-200 bg-white p-5">
          <h2 class="text-base font-bold text-neutral-900 border-l-4 border-[#C21642] pl-3">店舗</h2>
          <p class="mt-4 text-sm text-neutral-600 leading-relaxed" id="access-text"></p>
        </div>
      </div>
    </section>

    <section id="apply" class="mx-auto max-w-lg px-4 py-12 sm:py-16">
      <h2 class="text-center text-xl font-bold text-neutral-900">お申込み</h2>
      <p class="mt-2 text-center text-sm text-neutral-600">お名前・電話番号でお申込みいただけます。</p>

      <form id="kyodo-event-form" class="mt-8 space-y-6 rounded-lg border border-neutral-200 bg-white p-6 shadow-sm">
        <input type="hidden" name="formType" value="kyodo_may_studio_event">
        <input type="hidden" name="store_name" id="field-store-name">

        <div>
          <label class="block text-sm font-semibold text-neutral-800 required" for="name">氏名</label>
          <input class="input mt-1.5" type="text" id="name" name="name" autocomplete="name" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-neutral-800 required" for="phone">電話番号</label>
          <input class="input mt-1.5" type="tel" id="phone" name="phone" inputmode="tel" autocomplete="tel" required>
        </div>
        <div>
          <label class="block text-sm font-semibold text-neutral-800 required" for="event_slot">参加希望レッスン</label>
          <select class="input mt-1.5" id="event_slot" name="event_slot" required>
            <option value="" disabled selected>選択してください</option>
          </select>
        </div>
        <input type="hidden" name="visit_date" id="visit_date" value="">
        <input type="hidden" name="visit_time" id="visit_time" value="">
        <div>
          <label class="block text-sm font-semibold text-neutral-800" for="remarks">備考</label>
          <textarea class="input mt-1.5" id="remarks" name="remarks" rows="3" placeholder="任意"></textarea>
        </div>

        <div class="rounded-md border border-neutral-200 bg-neutral-50 p-4">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" name="consent" value="同意する" class="mt-1 h-4 w-4 shrink-0 rounded border-neutral-300 text-[#C21642] focus:ring-[#C21642]" required>
            <span class="text-sm text-neutral-700 leading-relaxed">注意事項・3階20時まで・事前予約、および当日のインターホン／30分前来店／スタッフ案内に同意します。</span>
          </label>
        </div>

        <div class="text-center pt-2">
          <button type="submit" class="w-full rounded-full bg-[#C21642] py-3.5 text-base font-bold text-white hover:bg-[#9d1135] sm:w-auto sm:px-14">送信する</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="bg-[#C21642] text-white">
    <div class="mx-auto max-w-2xl px-4 py-12 text-center">
      <img src="assets/joyfit24-logo.svg" alt="JOYFIT24" width="320" height="62" class="mx-auto h-14 w-auto max-w-full object-contain drop-shadow-sm">
      <p class="mt-8 text-sm text-white/90" id="footer-copy"></p>
      <p class="mt-3 text-xs text-white/65">本ページは店舗イベントの案内用です。</p>
    </div>
  </footer>

  <div id="toast" class="hidden fixed top-5 right-5 z-50 max-w-sm rounded-lg px-5 py-3 text-white shadow-lg transition-transform duration-300 translate-x-[120%]"></div>

  <script>
    (function () {
      const c = window.EVENT_CONFIG;
      document.getElementById('header-store').textContent = c.storeName;
      document.getElementById('hero-title').textContent = c.storeName + '｜' + c.campaignTitle;
      document.getElementById('hero-sub').textContent = c.subCatch;
      document.getElementById('hero-period').textContent = c.periodLine;
      document.getElementById('hero-venue').textContent = c.venueLine;
      document.getElementById('field-store-name').value = c.storeName;

      const points = document.getElementById('hero-points');
      c.noteBullets.forEach(function (t) {
        const li = document.createElement('li');
        li.className = 'flex gap-2 pl-0.5';
        li.innerHTML = '<span class="text-[#C21642] shrink-0 font-bold">・</span><span>' + t + '</span>';
        points.appendChild(li);
      });

      function parseTimeStart(timeRange) {
        var first = String(timeRange).split(/\u2013|\u2014|-|〜/)[0].trim();
        var segs = first.split(':');
        var hh = String(parseInt(segs[0], 10)).padStart(2, '0');
        var mm = String(parseInt(segs[1], 10)).padStart(2, '0');
        return hh + ':' + mm;
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/"/g, '&quot;');
      }

      const scheduleRoot = document.getElementById('schedule-days');
      const selectEl = document.getElementById('event_slot');
      const visitDateEl = document.getElementById('visit_date');
      const visitTimeEl = document.getElementById('visit_time');

      (window.GW_SCHEDULE || []).forEach(function (day) {
        const wrap = document.createElement('div');
        wrap.className = 'overflow-hidden rounded-lg border border-neutral-200 bg-white shadow-sm';
        wrap.innerHTML =
          '<div class="flex flex-col gap-1 bg-[#C21642] px-4 py-3 text-white sm:flex-row sm:items-center sm:justify-between sm:px-5">' +
          '<h3 class="text-base font-bold">' + esc(day.label) + '</h3>' +
          '<p class="text-xs text-white/90">' + esc(day.foot) + '</p>' +
          '</div>' +
          '<div class="space-y-6 p-4 sm:p-5" data-day="' + esc(day.dateIso) + '"></div>';
        const inner = wrap.querySelector('[data-day]');

        day.blocks.forEach(function (block) {
          const sub = document.createElement('div');
          sub.innerHTML =
            '<h4 class="mb-2 text-xs font-bold uppercase tracking-wider text-[#C21642]">' + esc(block.room) + '</h4>' +
            '<div class="overflow-hidden rounded-md border border-neutral-200">' +
            '<table class="min-w-full text-sm">' +
            '<thead class="bg-neutral-100 text-left text-neutral-700">' +
            '<tr><th class="px-3 py-2 font-semibold w-32">時間</th><th class="px-3 py-2 font-semibold">プログラム</th>' +
            '<th class="px-3 py-2 font-semibold w-20">難易度</th><th class="px-3 py-2 font-semibold w-28">インストラクター</th></tr></thead>' +
            '<tbody class="divide-y divide-neutral-100 bg-white"></tbody></table></div>';
          const tbody = sub.querySelector('tbody');

          block.lessons.forEach(function (les) {
            const tr = document.createElement('tr');
            tr.innerHTML =
              '<td class="px-3 py-2 font-medium text-neutral-900 whitespace-nowrap">' + esc(les.time) + '</td>' +
              '<td class="px-3 py-2 text-neutral-800">' + esc(les.title) +
              (les.caption ? '<p class="mt-1 text-xs text-neutral-500 leading-relaxed">' + esc(les.caption) + '</p>' : '') +
              '</td>' +
              '<td class="px-3 py-2 text-neutral-600">' + esc(les.difficulty) + '</td>' +
              '<td class="px-3 py-2 text-neutral-600">' + esc(les.instructor) + '</td>';
            tbody.appendChild(tr);

            const start = parseTimeStart(les.time);
            const optLabel =
              day.label + ' ' + block.room + ' ' + les.time + ' ' + les.title + '（' + les.difficulty + '／' + les.instructor + '）';
            const opt = document.createElement('option');
            opt.value =
              day.label +
              '｜' +
              block.room +
              '｜' +
              les.time +
              '｜' +
              les.title +
              '｜' +
              les.instructor;
            opt.textContent = optLabel;
            opt.setAttribute('data-date', day.dateIso);
            opt.setAttribute('data-time', start);
            selectEl.appendChild(opt);
          });

          inner.appendChild(sub);
        });

        scheduleRoot.appendChild(wrap);
      });

      function syncHiddenFromSelect() {
        const opt = selectEl.options[selectEl.selectedIndex];
        if (!opt || !opt.getAttribute('data-date')) {
          visitDateEl.value = '';
          visitTimeEl.value = '';
          return;
        }
        visitDateEl.value = opt.getAttribute('data-date');
        visitTimeEl.value = opt.getAttribute('data-time') || '';
      }

      selectEl.addEventListener('change', syncHiddenFromSelect);

      const nb = document.getElementById('notice-box');
      nb.innerHTML =
        '<div class="flex w-full flex-col sm:flex-row">' +
        '<div class="flex w-full shrink-0 items-center justify-center bg-[#C21642] px-4 py-4 text-center text-sm font-bold text-white sm:w-36 sm:py-6">ご確認</div>' +
        '<div class="flex-1 border-t border-neutral-200 p-4 text-sm text-neutral-700 sm:border-t-0 sm:border-l">' +
        '<ul class="list-disc space-y-1.5 pl-5">' +
        c.noteBullets.map(function (b) { return '<li>' + esc(b) + '</li>'; }).join('') +
        '</ul></div></div>';

      document.getElementById('access-text').innerHTML =
        '<span class="block font-medium text-neutral-900">' + esc(c.access.line1) + '</span>' +
        '<span class="mt-2 block">' + esc(c.access.line2) + '</span>';

      document.getElementById('footer-copy').textContent = c.storeName + '｜' + c.campaignTitle;
    })();

    const webAppUrl = 'PASTE_GAS_WEB_APP_URL_HERE';

    const form = document.getElementById('kyodo-event-form');
    const toast = document.getElementById('toast');

    function showToast(message, ok) {
      toast.textContent = message;
      toast.classList.remove('hidden', 'bg-red-700', 'bg-[#C21642]');
      toast.classList.add(ok ? 'bg-[#C21642]' : 'bg-red-700');
      requestAnimationFrame(function () {
        toast.classList.remove('translate-x-[120%]');
      });
      setTimeout(function () {
        toast.classList.add('translate-x-[120%]');
        setTimeout(function () { toast.classList.add('hidden'); }, 400);
      }, 5000);
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!webAppUrl || webAppUrl.indexOf('PASTE_') === 0) {
        showToast('GASのWebアプリURLを index.html の webAppUrl に設定してください。', false);
        return;
      }

      const slotSelect = document.getElementById('event_slot');
      const optSel = slotSelect ? slotSelect.options[slotSelect.selectedIndex] : null;
      const vdEl = document.getElementById('visit_date');
      const vtEl = document.getElementById('visit_time');
      if (optSel && optSel.getAttribute('data-date')) {
        vdEl.value = optSel.getAttribute('data-date');
        vtEl.value = optSel.getAttribute('data-time') || '';
      }

      const fd = new FormData(form);
      const vd = document.getElementById('visit_date').value;
      const vt = document.getElementById('visit_time').value;
      if (vd) {
        fd.set('visit_datetime', vt ? vd + ' ' + vt : vd);
      }

      const params = new URLSearchParams();
      fd.forEach(function (value, key) {
        params.append(key, value);
      });

      const btn = form.querySelector('button[type="submit"]');
      const prev = btn.textContent;
      btn.disabled = true;
      btn.textContent = '送信中...';

      fetch(webAppUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body: params.toString()
      })
        .then(function (r) { return r.text(); })
        .then(function (text) {
          var data;
          try {
            data = JSON.parse(text);
          } catch (err) {
            throw new Error('サーバーからの応答が不正です。');
          }
          if (data.result === 'success') {
            form.reset();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            showToast('送信が完了しました。', true);
          } else {
            throw new Error(data.message || '送信に失敗しました。');
          }
        })
        .catch(function (err) {
          showToast(err.message || '送信に失敗しました。', false);
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = prev;
        });
    });
  </script>
</body>
</html>
